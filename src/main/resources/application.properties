spring.application.name=razona-pro-backend

# ?? Servidor ??
server.port=${SERVER_PORT:8080}

# ?? PostgreSQL ??
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? HikariCP ??
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000

# ?? JPA / Hibernate (schema gestionado por el repo de BD) ??
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:razonapro}
spring.jpa.open-in-view=false

# ?? JWT ??
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.email-verification-expiration-ms=${JWT_EMAIL_VERIFY_EXPIRATION_MS:86400000}
jwt.password-reset-expiration-ms=${JWT_PASSWORD_RESET_EXPIRATION_MS:900000}

# ?? Mail (Gmail SMTP) ??
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ?? CORS ??
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
cors.max-age=${CORS_MAX_AGE:3600}

# ?? App ??
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.admin-initializer.enabled=${ADMIN_INITIALIZER_ENABLED:true}
app.admin-initializer.email=${ADMIN_INITIAL_EMAIL:admin@razonapro.com}
app.admin-initializer.password=${ADMIN_INITIAL_PASSWORD:Admin123!}
app.admin-initializer.first-name=${ADMIN_INITIAL_FIRST_NAME:Super}
app.admin-initializer.last-name=${ADMIN_INITIAL_LAST_NAME:Admin}
app.admin-initializer.phone=${ADMIN_INITIAL_PHONE:+573001234567}

# ?? OpenAPI / Swagger ??
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.packages-to-scan=com.razonapro.razonaprobackend

# ?? IA · selector de proveedor (CLOUD | OLLAMA | NONE) ??
ai.model.enabled=${AI_MODEL_ENABLED:false}
ai.model.provider=${AI_MODEL_PROVIDER:NONE}

# ?? IA · Cloud (Groq / OpenAI / OpenRouter ? protocolo OpenAI) ??
ai.model.cloud-base-url=${AI_CLOUD_BASE_URL:https://api.groq.com/openai/v1}
ai.model.cloud-api-key=${AI_CLOUD_API_KEY:}
ai.model.cloud-model=${AI_CLOUD_MODEL:llama-3.3-70b-versatile}
ai.model.cloud-timeout=${AI_CLOUD_TIMEOUT:60}
ai.model.cloud-temperature=${AI_CLOUD_TEMPERATURE:0.7}
ai.model.cloud-max-retries=${AI_CLOUD_MAX_RETRIES:3}

# ?? IA · Ollama (fallback local) ??
ai.model.ollama-base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ai.model.ollama-model=${OLLAMA_MODEL:mistral}
ai.model.ollama-timeout=${OLLAMA_TIMEOUT:120}
ai.model.ollama-temperature=${OLLAMA_TEMPERATURE:0.7}
ai.model.ollama-max-retries=${OLLAMA_MAX_RETRIES:3}