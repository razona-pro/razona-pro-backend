spring.application.name=razona-pro-backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:razonapro}
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
jwt.email-verification-expiration-ms=${JWT_EMAIL_VERIFY_EXPIRATION_MS}
jwt.password-reset-expiration-ms=${JWT_PASSWORD_RESET_EXPIRATION_MS}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail-from=${MAIL_FROM}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.allowed-methods=${CORS_ALLOWED_METHODS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS}
cors.exposed-headers=${CORS_EXPOSED_HEADERS}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS}
cors.max-age=${CORS_MAX_AGE}

app.frontend-url=${FRONTEND_URL}
app.admin-initializer.enabled=${ADMIN_INITIALIZER_ENABLED}
app.admin-initializer.email=${ADMIN_INITIAL_EMAIL}
app.admin-initializer.password=${ADMIN_INITIAL_PASSWORD}
app.admin-initializer.first-name=${ADMIN_INITIAL_FIRST_NAME}
app.admin-initializer.last-name=${ADMIN_INITIAL_LAST_NAME}
app.admin-initializer.phone=${ADMIN_INITIAL_PHONE}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.packages-to-scan=com.razonapro.razonaprobackend

ai.model.enabled=${AI_MODEL_ENABLED:false}
ai.model.provider=${AI_MODEL_PROVIDER:DISABLED}

ai.model.cloud-base-url=${AI_CLOUD_BASE_URL:https://api.openai.com/v1}
ai.model.cloud-api-key=${AI_CLOUD_API_KEY:}
ai.model.cloud-model=${AI_CLOUD_MODEL:gpt-4o-mini}
ai.model.cloud-timeout=${AI_CLOUD_TIMEOUT:60}
ai.model.cloud-temperature=${AI_CLOUD_TEMPERATURE:0.7}
ai.model.cloud-max-retries=${AI_CLOUD_MAX_RETRIES:3}

ai.model.ollama-base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ai.model.ollama-model=${OLLAMA_MODEL:mistral}
ai.model.ollama-timeout=${OLLAMA_TIMEOUT:120}
ai.model.ollama-temperature=${OLLAMA_TEMPERATURE:0.7}
ai.model.ollama-max-retries=${OLLAMA_MAX_RETRIES:3}